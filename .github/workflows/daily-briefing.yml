
name: Daily 8AM Briefing

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 뉴스 헤드라인 수집 (무료 RSS)
        run: python fetch_news.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add latest.json
          git diff --staged --quiet || git commit -m "Update briefing $(date -u +%Y-%m-%d)"
          git push
